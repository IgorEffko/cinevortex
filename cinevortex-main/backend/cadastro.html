<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVortex • Cadastro</title>
    <link rel="stylesheet" href="/aparecida/backend/css/cadastro.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1 class="logo">CINE<span>VORTEX</span></h1>
            <h2>Cadastro</h2>
            
            <form id="cadastroForm" class="form">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="nome" required placeholder="Seu nome">
                </div>
                
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div class="input-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn">Cadastrar</button>
            </form>
            
            <p class="register-link">
                Já tem uma conta? <a href="login.html">Faça login</a>
            </p>
        </div>
    </div>

    <script src="/aparecida/backend/js/cadastro.js"></script>
</body>
</html>
